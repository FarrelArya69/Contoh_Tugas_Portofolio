<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Portofolio</title>
    <!-- Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">Farrel.<span>Admin</span></div>
            <h2>Selamat Datang Kembali</h2>
            <p>Silakan masuk untuk mengelola portofolio Anda</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" required autofocus autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
                <div id="errorMessage" class="error-msg" style="display: none;"></div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span>Masuk</span> <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
            <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Kembali ke Portfolio</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
